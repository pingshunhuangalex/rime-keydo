name: Nightly Release

on:
    schedule:
        - cron: '0 20 * * *' # Run at 20:00 UTC (6:00 AM AEST)
    workflow_dispatch: # Allow manually triggering the workflow from the Actions tab

jobs:
    check-commits:
        runs-on: ubuntu-latest
        outputs:
            skip: ${{ steps.commit-check.outputs.skip }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Fetch full history to reliably check 24-hour commits

            - name: Check for new commits in the past 24 hours
              id: commit-check
              run: |
                  # Check for new commits in the past 24 hours
                  echo "🟣 Checking commit history..."

                  # Force run if manually triggered, otherwise check for commits in the last 24 hours
                  if [[ -z $(git log --since="24 hours ago" --oneline) && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                    echo "🟡 No new commits found in the last 24 hours. The existing release is still valid!"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                    echo "🟢 New commits detected (or manual run triggered)!"
                  fi

    validate-logic:
        runs-on: ubuntu-latest
        needs: check-commits
        if: needs.check-commits.outputs.skip == 'false'
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Syntax and linting check for Lua
              run: |
                  # Check for syntax and linting issues in Lua files
                  bash scripts/validate-logic.sh --install-deps

    build-images:
        runs-on: ubuntu-latest
        needs: [check-commits, validate-logic]
        if: needs.check-commits.outputs.skip == 'false'
        outputs:
            nightly-tag: ${{ steps.build-artifacts.outputs.nightly-tag }}
            mac-artifact: ${{ steps.build-artifacts.outputs.mac-artifact }}
            win-artifact: ${{ steps.build-artifacts.outputs.win-artifact }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Build OS-specific artifacts
              id: build-artifacts
              run: |
                  # Build Keydo artifacts based on OS
                  echo "🟣 Checking the date today..."
                  DATE=$(date +"%Y.%m.%d")
                  echo "nightly-tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"

                  echo "🟣 Building Keydo for Mac..."
                  cp platform/mac/keydo.custom.yaml ./keydo.custom.yaml
                  zip -qr "keydo-mac-nightly-${DATE}.zip" \
                      lua/ \
                      rime.lua \
                      default.custom.yaml \
                      squirrel.custom.yaml \
                      keydo.*.yaml \
                      -x "lua/*.draft.lua"
                  rm keydo.custom.yaml

                  echo "🟣 Building Keydo for Windows..."
                  cp platform/win/keydo.custom.yaml ./keydo.custom.yaml
                  zip -qr "keydo-win-nightly-${DATE}.zip" \
                      lua/ \
                      rime.lua \
                      default.custom.yaml \
                      weasel.custom.yaml \
                      keydo.*.yaml \
                      -x "lua/*.draft.lua"
                  rm keydo.custom.yaml

                  echo "mac-artifact=keydo-mac-nightly-${DATE}.zip" >> "$GITHUB_OUTPUT"
                  echo "win-artifact=keydo-win-nightly-${DATE}.zip" >> "$GITHUB_OUTPUT"

                  echo "🟢 Keydo artifacts built and compressed!"

            - name: Upload Mac artifact
              uses: actions/upload-artifact@v7
              with:
                  name: mac-artifact
                  path: ${{ steps.build-artifacts.outputs.mac-artifact }}

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v7
              with:
                  name: win-artifact
                  path: ${{ steps.build-artifacts.outputs.win-artifact }}

    publish-releases:
        runs-on: ubuntu-latest
        needs: [check-commits, validate-logic, build-images]
        if: needs.check-commits.outputs.skip == 'false'
        permissions:
            contents: write # Required for pushing tags and updating releases
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0 # Fetch full history to reliably move tags

            - name: Download Mac artifact
              uses: actions/download-artifact@v8
              with:
                  name: mac-artifact

            - name: Download Windows artifact
              uses: actions/download-artifact@v8
              with:
                  name: win-artifact

            - name: Clean up legacy nightly tags and releases
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Clean up legacy nightly tags and releases
                  echo "🟣 Scanning old nightly tags and releases..."

                  LEGACY_RELEASES=$(git ls-remote --tags origin 'refs/tags/nightly-*' | grep -v '\^{}' | awk -F'/' '{print $3}')

                  for TAG in ${LEGACY_RELEASES}; do
                    echo "🟣 Cleaning up old release ${TAG}..."
                    gh release delete "${TAG}" --yes || echo "🟡 Release ${TAG} is already gone"

                    echo "🟣 Cleaning up old tag ${TAG}..."
                    git push origin --delete "${TAG}" || echo "🟡 Tag ${TAG} is already gone"
                    git tag -d "${TAG}" || true
                  done

                  echo "🟢 Legacy tags and releases cleaned up!"

            - name: Relocate the nightly tag
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Relocate the nightly tag
                  echo "🟣 Relocating the nightly tag..."
                  NIGHTLY_TAG=${{ needs.build-images.outputs.nightly-tag }}

                  OWNER="${{ github.repository_owner }}"
                  NAME=$(gh api /users/${OWNER} --jq '.name // .login'); NAME="${NAME% (*}"
                  ID=$(gh api /users/${OWNER} --jq '.id')
                  EMAIL="${ID}+${OWNER}@users.noreply.github.com"

                  git config --global user.name "${NAME}"
                  git config --global user.email "${EMAIL}"

                  echo "🟣 Signing the nightly tag with ${NAME}<${EMAIL}>..."

                  mkdir -p ~/.ssh
                  echo "${{ secrets.WORKFLOW_TAG_SIGNING_PRIVATE_KEY }}" > ~/.ssh/signing_key
                  chmod 600 ~/.ssh/signing_key

                  git config --global gpg.format ssh
                  git config --global tag.gpgSign true
                  git config --global user.signingkey ~/.ssh/signing_key

                  git tag -s "${NIGHTLY_TAG}" -m "Nightly Build ${NIGHTLY_TAG}"
                  git push https://x-token-auth:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git "${NIGHTLY_TAG}"

                  rm -rf ~/.ssh
                  git config --global --unset user.signingkey || true

                  echo "🟢 Nightly tag ${NIGHTLY_TAG} is ready!"

            - name: Publish the nightly release
              uses: softprops/action-gh-release@v3
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fail_on_unmatched_files: true
                  prerelease: true
                  tag_name: ${{ needs.build-images.outputs.nightly-tag }}
                  target_commitish: ${{ github.sha }}
                  name: 'Keydo Nightly Build - Ouroboros (衔尾蛇)'
                  body: |
                      <img width="2624" height="1464" alt="Ouroboros" src="https://github.com/pingshunhuangalex/rime-keydo/blob/main/preview/release_nightly.png" />

                      ## 键道·我流 - 日更版

                      ### 安装说明
                      下载对应平台的压缩包，解压后将所有文件覆盖于`Rime用户文件夹`，便可无需配置立即使用。

                      ### Rime用户文件夹说明
                      - [Mac] 鼠须管 (Squirrel): `~/Library/Rime/`
                      - [Win] 小狼毫 (Weasel): `%APPDATA%\Rime\`

                      ### 下载文件说明
                      - [Mac] 鼠须管 (Squirrel): `keydo-mac-${{ needs.build-images.outputs.nightly-tag }}.zip`
                      - [Win] 小狼毫 (Weasel): `keydo-win-${{ needs.build-images.outputs.nightly-tag }}.zip`

                      ### 更新内容
                      请查看[提交历史](https://github.com/pingshunhuangalex/rime-keydo/commits/main/)以了解更新详情。

                      <details>
                          <summary><h3>致谢</h3></summary>
                          <ul><li>审词: @pingshunhuangalex</li></ul>
                      </details>
                  files: |
                      ${{ needs.build-images.outputs.mac-artifact }}
                      ${{ needs.build-images.outputs.win-artifact }}
