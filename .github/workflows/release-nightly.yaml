name: Nightly Release

on:
    schedule:
        - cron: '0 20 * * *' # Run at 20:00 UTC (6:00 AM AEST)
    workflow_dispatch: # Allow manually triggering the workflow from the Actions tab

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required for pushing tags and updating releases

        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Get bot fingerprints
              id: get-bot-fingerprints
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Fetch bot identity via token
                  APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
                  BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq '.id')

                  BOT_NAME="${APP_SLUG}[bot]"
                  BOT_EMAIL="${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com" # Grab bot info from https://api.github.com/users/sphs-actions[bot]

                  echo "bot-name=${BOT_NAME}" >> "$GITHUB_OUTPUT"
                  echo "bot-email=${BOT_EMAIL}" >> "$GITHUB_OUTPUT"

                  echo "🟢 Bot ${BOT_NAME}<${BOT_EMAIL}> identified!"

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0 # Fetch full history to reliably check 24-hour commits and move tags

            - name: Check for new commits in the past 24 hours
              id: commit-check
              run: |
                  # Check for new commits in the past 24 hours
                  echo "🟣 Checking commit history..."

                  # Force run if manually triggered, otherwise check for commits in the last 24 hours
                  if [[ -z $(git log --since="24 hours ago" --oneline) && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                    echo "🟡 No new commits found in the last 24 hours. The existing release is still valid!"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                    echo "🟢 New commits detected (or manual run triggered)!"
                  fi

            - name: Syntax and linting issues check for Lua
              if: steps.commit-check.outputs.skip == 'false'
              run: |
                  # Check for syntax and linting issues in Lua files
                  echo "🟣 Installing dependencies..."
                  sudo apt-get update > /dev/null 2>&1
                  sudo apt-get install -y lua5.3 liblua5.3-dev luarocks build-essential unzip > /dev/null 2>&1
                  sudo luarocks install luacheck > /dev/null 2>&1

                  echo "🟣 Checking Lua files via Luacheck..."
                  luacheck lua/ rime.lua \
                      --exclude-files "lua/*.draft.lua" \
                      --no-color \
                      --only 0

                  echo "🟣 Running strict Lua compilation check..."
                  find . -name "*.lua" ! -name "*.draft.lua" -exec luac5.3 -p {} \;

                  echo "🟢 All Lua files pass the syntax and linting checks!"

            - name: Package OS-specific Keydo assets
              id: get-keydo-assets
              if: steps.commit-check.outputs.skip == 'false'
              run: |
                  # Prepare Keydo assets based on OS
                  echo "🟣 Checking the date today..."
                  DATE=$(date +"%Y.%m.%d")
                  echo "nightly-tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"

                  echo "🟣 Preparing Keydo for Mac..."
                  cp platform/mac/keydo.custom.yaml ./keydo.custom.yaml
                  zip -qr "keydo-mac-nightly-${DATE}.zip" \
                      lua/ \
                      rime.lua \
                      default.custom.yaml \
                      squirrel.custom.yaml \
                      keydo.*.yaml \
                      -x "lua/*.draft.lua"
                  rm keydo.custom.yaml

                  echo "🟣 Preparing Keydo for Windows..."
                  cp platform/win/keydo.custom.yaml ./keydo.custom.yaml
                  zip -qr "keydo-win-nightly-${DATE}.zip" \
                      lua/ \
                      rime.lua \
                      default.custom.yaml \
                      weasel.custom.yaml \
                      keydo.*.yaml \
                      -x "lua/*.draft.lua"
                  rm keydo.custom.yaml

                  echo "mac-asset=keydo-mac-nightly-${DATE}.zip" >> "$GITHUB_OUTPUT"
                  echo "win-asset=keydo-win-nightly-${DATE}.zip" >> "$GITHUB_OUTPUT"

                  echo "🟢 Keydo assets compressed!"

            - name: Clean up legacy nightly tags and releases
              if: steps.commit-check.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Clean up legacy nightly tags and releases
                  echo "🟣 Scanning old nightly tags and releases..."

                  LEGACY_RELEASES=$(git ls-remote --tags origin 'refs/tags/nightly-*' | grep -v '\^{}' | awk -F'/' '{print $3}')

                  for TAG in ${LEGACY_RELEASES}; do
                    echo "🟣 Cleaning up old release ${TAG}..."
                    gh release delete "${TAG}" --yes || echo "🟡 Release ${TAG} is already gone"

                    echo "🟣 Cleaning up old tag ${TAG}..."
                    git push origin --delete "${TAG}" || echo "🟡 Tag ${TAG} is already gone"
                    git tag -d "${TAG}" || true
                  done

                  echo "🟢 Legacy tags and releases cleaned up!"

            - name: Prepare the nightly tag
              if: steps.commit-check.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Prepare the nightly tag
                  echo "🟣 Preparing the nightly tag..."
                  NIGHTLY_TAG=${{ steps.get-keydo-assets.outputs.nightly-tag }}

                  OWNER="${{ github.repository_owner }}"
                  NAME=$(gh api /users/${OWNER} --jq '.name // .login')
                  ID=$(gh api /users/${OWNER} --jq '.id')
                  EMAIL="${ID}+${OWNER}@users.noreply.github.com"

                  git config --global user.name "${NAME}"
                  git config --global user.email "${EMAIL}"

                  echo "🟣 Signing the nightly tag with ${NAME}<${EMAIL}>..."

                  mkdir -p ~/.ssh
                  echo "${{ secrets.WORKFLOW_TAG_SIGNING_PRIVATE_KEY }}" > ~/.ssh/signing_key
                  chmod 600 ~/.ssh/signing_key

                  git config --global gpg.format ssh
                  git config --global user.signingkey ~/.ssh/signing_key
                  git config --global tag.gpgSign true

                  git tag -s "${NIGHTLY_TAG}" -m "Nightly Build ${NIGHTLY_TAG}"
                  git push https://x-token-auth:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git "${NIGHTLY_TAG}"

                  rm -rf ~/.ssh
                  git config --global --unset user.signingkey || true

                  echo "🟢 Nightly tag ${NIGHTLY_TAG} is ready!"

            - name: Prepare the nightly release
              if: steps.commit-check.outputs.skip == 'false'
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Prepare the nightly release
                  echo "🟣 Preparing the nightly release..."
                  NIGHTLY_TAG=${{ steps.get-keydo-assets.outputs.nightly-tag }}

                  RELEASE_NOTES=$(cat <<EOF
                  <img width="2624" height="1464" alt="Ouroboros" src="https://github.com/pingshunhuangalex/rime-keydo/blob/main/preview/release_nightly.png" />

                  ## 键道·我流 - 日更版

                  ### 安装说明
                  下载对应平台的压缩包，解压后将所有文件覆盖于\`Rime用户文件夹\`，便可无需配置立即使用。

                  ### Rime用户文件夹说明
                  - [Mac] 鼠须管 (Squirrel): \`~/Library/Rime/\`
                  - [Win] 小狼毫 (Weasel): \`%APPDATA%\\Rime\\\`

                  ### 下载文件说明
                  - [Mac] 鼠须管 (Squirrel): \`keydo-mac-${NIGHTLY_TAG}.zip\`
                  - [Win] 小狼毫 (Weasel): \`keydo-win-${NIGHTLY_TAG}.zip\`

                  ### 更新内容
                  请查看[提交历史](https://github.com/pingshunhuangalex/rime-keydo/commits/main/)以了解更新详情。

                  <details>
                  <summary><h3>致谢</h3></summary>
                  <ul>
                  <li>审词: @pingshunhuangalex</li>
                  </ul>
                  </details>
                  EOF
                  )

                  gh release create "${NIGHTLY_TAG}" \
                    --target "$GITHUB_SHA" \
                    --title "Keydo Nightly Build - Ouroboros (衔尾蛇)" \
                    --prerelease \
                    --notes "${RELEASE_NOTES}"

                  echo "🟣 Uploading Keydo assets..."
                  gh release upload "${NIGHTLY_TAG}" "${{ steps.get-keydo-assets.outputs.mac-asset }}" "${{ steps.get-keydo-assets.outputs.win-asset }}"

                  echo "🟢 Keydo assets attached and the release ${NIGHTLY_TAG} is now live!"
