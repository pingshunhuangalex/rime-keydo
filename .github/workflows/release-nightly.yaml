name: Nightly Release

on:
    schedule:
        - cron: '0 20 * * *' # Run at 20:00 UTC (6:00 AM AEST)
    workflow_dispatch: # Allow manually triggering the workflow

jobs:
    check-commits:
        runs-on: ubuntu-latest
        outputs:
            skip: ${{ steps.commit-check.outputs.skip }}
            nightly-tag: ${{ steps.commit-check.outputs.nightly-tag }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Fetch full history to reliably check 24-hour commits

            - name: Check for new commits in the past 24 hours
              id: commit-check
              run: |
                  # Check for new commits in the past 24 hours
                  echo "🟣 Checking commit history..."

                  # Force run if manually triggered, otherwise check for commits in the last 24 hours
                  if [[ -z $(git log --since="24 hours ago" --oneline) && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                    echo "🟡 No new commits found in the last 24 hours. The existing release is still valid!"
                  else
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                    echo "🟢 New commits detected (or manual run triggered)!"
                  fi

                  DATE=$(date +"%Y.%m.%d")
                  echo "nightly-tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"

    pre-validate:
        needs: check-commits
        if: needs.check-commits.outputs.skip == 'false'
        uses: ./.github/workflows/_validate-features.yaml

    build:
        needs: check-commits
        if: needs.check-commits.outputs.skip == 'false'
        uses: ./.github/workflows/_build-images.yaml
        with:
            is_release: 'true'
            tag_name: ${{ needs.check-commits.outputs.nightly-tag }}

    post-validate:
        needs: [check-commits, build]
        if: needs.check-commits.outputs.skip == 'false'
        uses: ./.github/workflows/_validate-schema.yaml

    publish-releases:
        runs-on: ubuntu-latest
        needs: [check-commits, pre-validate, build, post-validate]
        if: needs.check-commits.outputs.skip == 'false'
        permissions:
            contents: write # Required for pushing tags and updating releases
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0 # Fetch full history to reliably move tags

            - name: Download image artifacts
              uses: actions/download-artifact@v8
              with:
                  name: image-artifacts
                  path: build/

            - name: Clean up legacy nightly tags and releases
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Clean up legacy nightly tags and releases
                  echo "🟣 Scanning old nightly tags and releases..."

                  LEGACY_RELEASES=$(git ls-remote --tags origin 'refs/tags/nightly-*' | grep -v '\^{}' | awk -F'/' '{print $3}')

                  for TAG in ${LEGACY_RELEASES}; do
                    echo "🟣 Cleaning up old release ${TAG}..."
                    gh release delete "${TAG}" --yes || echo "🟡 Release ${TAG} is already gone"

                    echo "🟣 Cleaning up old tag ${TAG}..."
                    git push origin --delete "${TAG}" || echo "🟡 Tag ${TAG} is already gone"
                    git tag -d "${TAG}" || true
                  done

                  echo "🟢 Legacy tags and releases cleaned up!"

            - name: Relocate the nightly tag
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Relocate the nightly tag
                  echo "🟣 Relocating the nightly tag..."
                  NIGHTLY_TAG=${{ needs.check-commits.outputs.nightly-tag }}

                  OWNER="${{ github.repository_owner }}"
                  NAME=$(gh api /users/${OWNER} --jq '.name // .login'); NAME="${NAME% (*}"
                  ID=$(gh api /users/${OWNER} --jq '.id')
                  EMAIL="${ID}+${OWNER}@users.noreply.github.com"

                  git config --global user.name "${NAME}"
                  git config --global user.email "${EMAIL}"

                  echo "🟣 Signing the nightly tag with ${NAME}<${EMAIL}>..."

                  mkdir -p ~/.ssh
                  echo "${{ secrets.WORKFLOW_TAG_SIGNING_PRIVATE_KEY }}" > ~/.ssh/signing_key
                  chmod 600 ~/.ssh/signing_key

                  git config --global gpg.format ssh
                  git config --global tag.gpgSign true
                  git config --global user.signingkey ~/.ssh/signing_key

                  git tag -s "${NIGHTLY_TAG}" -m "Nightly Build ${NIGHTLY_TAG}"
                  git push https://x-token-auth:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git "${NIGHTLY_TAG}"

                  rm -rf ~/.ssh
                  git config --global --unset user.signingkey || true

                  echo "🟢 Nightly tag ${NIGHTLY_TAG} is ready!"

            - name: Generate the nightly release notes
              env:
                  NIGHTLY_TAG: ${{ needs.check-commits.outputs.nightly-tag }}
              run: |
                  # Generate release notes from the nightly release template
                  envsubst < .github/templates/NIGHTLY_RELEASE_TEMPLATE.md > ${{ runner.temp }}/NIGHTLY_RELEASE.md

            - name: Publish the nightly release
              uses: softprops/action-gh-release@v3
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fail_on_unmatched_files: true
                  prerelease: true
                  tag_name: ${{ needs.check-commits.outputs.nightly-tag }}
                  target_commitish: ${{ github.sha }}
                  name: 'Keydo Nightly Build - Ouroboros (衔尾蛇)'
                  body_path: ${{ runner.temp }}/NIGHTLY_RELEASE.md
                  files: build/*.zip
